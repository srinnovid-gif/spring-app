<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

  <meta name="theme-color" content="#f2ebe0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Spring"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script type="module">

    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyD_xPTSVu7YsNtsqGLapdzH8FCgzzUIEao",
      authDomain: "spring-2533d.firebaseapp.com",
      databaseURL: "https://spring-2533d-default-rtdb.firebaseio.com",
      projectId: "spring-2533d",
      storageBucket: "spring-2533d.firebasestorage.app",
      messagingSenderId: "59482220773",
      appId: "1:59482220773:web:1c3b603c0396bbd05c8c0c"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    window._fb = { auth, db, ref, onValue, set, push, remove, update, get, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged };
  </script>

  <link rel="stylesheet" href="style.css"/>

</head></head>
<body>

<div id="splash">
  <div class="sp-bg-base"></div>
  <div class="sp-center">
    <div class="splash-name-wrap">
      <span class="splash-s">S</span><span class="splash-p">p</span><span class="splash-r">r</span><span class="splash-i">i</span><span class="splash-n">n</span><span class="splash-g">g</span>
    </div>
    <div class="splash-line"></div>
    <div class="splash-rest">Restaurante</div>
    <div class="splash-tagline-nat">Gestão de Cozinha</div>
  </div>
  <div class="sp-bottom">
    <div class="sp-bar"><div class="sp-bar-fill"></div></div>
    <div class="sp-pct" id="splash-pct">Carregando...</div>
  </div>
</div>

<div id="auth" style="display:none;flex-direction:column;">
  <div class="auth-wrap">
    <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:700;font-style:italic;letter-spacing:-2px;text-align:center;margin-bottom:4px;color:#2c1a0e;">Spring<span style="color:#c4541a">.</span></div>
    <div class="auth-tag">Restaurante · Buffet · Curitiba</div>
    <div class="auth-card">
      <div class="tabs2">
        <button class="tab2 on" onclick="authTab('login')">Entrar</button>
        <button class="tab2" onclick="authTab('register')">Cadastrar</button>
      </div>

      <!-- LOGIN -->
      <div id="login-f">
        <div class="fld"><label>E-mail <span style="color:#c4541a;font-weight:700">*</span></label><input type="email" id="l-email" placeholder="seu@email.com"/></div>
        <div class="fld"><label>Código de Acesso <span style="color:#c4541a;font-weight:700">*</span> <span style="color:var(--t3);font-size:10px;font-weight:400">(4 dígitos)</span></label><input type="password" inputmode="numeric" pattern="[0-9]*" id="l-code" placeholder="• • • •" maxlength="4" autocomplete="off" style="letter-spacing:10px;font-weight:700;font-size:24px;text-align:center;font-family:'DM Sans',sans-serif;-webkit-text-security:disc" oninput="this.value=this.value.replace(/[^0-9]/g,'');if(this.value.length>4)this.value=this.value.slice(0,4)"/></div>
        <button class="btn-main" onclick="doLogin()">Entrar</button>
      </div>

      <!-- REGISTER -->
      <div id="reg-f" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="fld"><label>Nome <span style="color:#c4541a;font-weight:700">*</span></label><input type="text" id="r-name" placeholder="Seu nome"/></div>
          <div class="fld"><label>Sobrenome <span style="color:#c4541a;font-weight:700">*</span></label><input type="text" id="r-lastname" placeholder="Sobrenome"/></div>
        </div>
        <div class="fld"><label>E-mail <span style="color:#c4541a;font-weight:700">*</span></label><input type="email" id="r-email" placeholder="seu@email.com"/></div>
        <div class="fld"><label>Celular / WhatsApp <span style="color:#c4541a;font-weight:700">*</span></label><input type="tel" id="r-phone" placeholder="+55 41 99999-9999"/></div>
        <div class="fld">
          <label>Quando é seu aniversário? <span style="color:#c4541a;font-weight:700">*</span></label>
          <div style="display:grid;grid-template-columns:2fr 2fr 3fr;gap:8px;margin-top:2px">
            <select id="r-day" style="background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:13px 8px;color:var(--t1);font-size:15px;font-family:var(--font-b);outline:none">
              <option value="" disabled selected style="color:var(--t3)">Dia</option>
              <option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
            </select>
            <select id="r-month" style="background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:13px 8px;color:var(--t1);font-size:15px;font-family:var(--font-b);outline:none">
              <option value="" disabled selected style="color:var(--t3)">Mês</option>
              <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option>
              <option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option>
              <option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option>
              <option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
            </select>
            <select id="r-year" style="background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:13px 8px;color:var(--t1);font-size:15px;font-family:var(--font-b);outline:none">
              <option value="" disabled selected style="color:var(--t3)">Ano</option>
              <option value="2010">2010</option><option value="2009">2009</option><option value="2008">2008</option><option value="2007">2007</option><option value="2006">2006</option><option value="2005">2005</option><option value="2004">2004</option><option value="2003">2003</option><option value="2002">2002</option><option value="2001">2001</option><option value="2000">2000</option><option value="1999">1999</option><option value="1998">1998</option><option value="1997">1997</option><option value="1996">1996</option><option value="1995">1995</option><option value="1994">1994</option><option value="1993">1993</option><option value="1992">1992</option><option value="1991">1991</option><option value="1990">1990</option><option value="1989">1989</option><option value="1988">1988</option><option value="1987">1987</option><option value="1986">1986</option><option value="1985">1985</option><option value="1984">1984</option><option value="1983">1983</option><option value="1982">1982</option><option value="1981">1981</option><option value="1980">1980</option><option value="1979">1979</option><option value="1978">1978</option><option value="1977">1977</option><option value="1976">1976</option><option value="1975">1975</option><option value="1974">1974</option><option value="1973">1973</option><option value="1972">1972</option><option value="1971">1971</option><option value="1970">1970</option><option value="1969">1969</option><option value="1968">1968</option><option value="1967">1967</option><option value="1966">1966</option><option value="1965">1965</option><option value="1964">1964</option><option value="1963">1963</option><option value="1962">1962</option><option value="1961">1961</option><option value="1960">1960</option><option value="1959">1959</option><option value="1958">1958</option><option value="1957">1957</option><option value="1956">1956</option><option value="1955">1955</option><option value="1954">1954</option><option value="1953">1953</option><option value="1952">1952</option><option value="1951">1951</option><option value="1950">1950</option><option value="1949">1949</option><option value="1948">1948</option><option value="1947">1947</option><option value="1946">1946</option><option value="1945">1945</option><option value="1944">1944</option><option value="1943">1943</option><option value="1942">1942</option><option value="1941">1941</option><option value="1940">1940</option>
            </select>
          </div>
        </div>
        <div class="fld"><label>Unidade <span style="color:#c4541a;font-weight:700">*</span></label>
          <select id="r-sede">
            <option value="juveve">🏠 Juvevê</option>
            <option value="batel">🏠 Batel</option>
          </select>
        </div>
        <div class="fld">
          <label>Função <span style="color:#c4541a;font-weight:700">*</span></label>
          <input type="hidden" id="r-role" value=""/>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px">

            <button type="button" onclick="selectRole(this,'gerente')" class="role-btn" style="background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:16px 6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <div style="font-size:11px;font-weight:600;color:var(--t1);font-family:var(--font-b)">Gerente</div>
            </button>

            <button type="button" onclick="selectRole(this,'chef')" class="role-btn" style="background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:16px 6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
              <div style="font-size:11px;font-weight:600;color:var(--t1);font-family:var(--font-b)">Chef</div>
            </button>

            <button type="button" onclick="selectRole(this,'cocinero')" class="role-btn" style="background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:16px 6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2l1.5 1.5M12 2c0 4.4-3.6 8-8 8"/><path d="M3 10c4.4 0 8-3.6 8-8M19 22l-8.5-8.5M22 19l-8.5-8.5M14.5 14.5L22 22"/></svg>
              <div style="font-size:11px;font-weight:600;color:var(--t1);font-family:var(--font-b)">Cozinheiro</div>
            </button>

            <button type="button" onclick="selectRole(this,'deposito')" class="role-btn" style="background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:16px 6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l10-5 10 5v10l-10 5L2 17z"/><path d="M12 22V12M2 7l10 5 10-5"/></svg>
              <div style="font-size:11px;font-weight:600;color:var(--t1);font-family:var(--font-b)">Estoque</div>
            </button>

            <button type="button" onclick="selectRole(this,'salon')" class="role-btn" style="background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:16px 6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 10h18M3 14h18M3 18h18"/><path d="M5 6v12M19 6v12"/></svg>
              <div style="font-size:11px;font-weight:600;color:var(--t1);font-family:var(--font-b)">Salão</div>
            </button>

          </div>
        </div>
        <button class="btn-main" onclick="doRegister()">Solicitar acesso</button>
        <div class="auth-info">Após o cadastro, você receberá um código de acesso por e-mail para fazer login.</div>
      </div>
      <div class="auth-err" id="auth-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <!-- HOME -->
  <div id="home-screen">
    <div class="hdr">
      <div class="hdr-inner">
        <div class="hdr-left">
          <div class="hdr-greeting" id="hdr-greeting">Bem-vindo</div>
          <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;font-style:italic;letter-spacing:-1px;color:#2c1a0e;">Spring<span style="color:#c4541a">.</span></div>
        </div>
        <div class="hdr-right">
          <div class="role-pill" id="role-badge">—</div>
          <button class="btn-out" onclick="doLogout()">Sair</button>
        </div>
      </div>
    </div>
    <div class="online" style="margin-bottom:16px"><span class="odot"></span><span class="olbl">Tempo real ativo</span></div>
    <div class="home-date" id="home-date"></div>
    <div class="qs-row" id="qs-row"></div>
    <div id="alert-strip-wrap"></div>
    <div class="big-nav" id="big-nav"></div>
    <div id="today-menu-wrap"></div>
  </div>
  <!-- INNER -->
  <div id="inner-screen" style="display:none">
    <div class="inner-hdr">
      <div class="inner-hdr-top">
        <button class="btn-back2" onclick="goHome()">←</button>
        <div class="inner-title" id="inner-title"></div>
      </div>
    </div>
    <div id="main-content" class="content"></div>
  </div>
</div>

<button class="fab" id="fab" style="display:none">+</button>

<div class="overlay" id="sheet-ov" onclick="closeSheetIfOut(event)">
  <div class="sheet" id="sheet-inner"></div>
</div>

<div class="conf-ov" id="conf-ov">
  <div class="conf-box">
    <div class="conf-ico">⚠️</div>
    <div class="conf-title">Excluir?</div>
    <div class="conf-item" id="conf-item">—</div>
    <div class="conf-note">Esta ação não pode ser desfeita.</div>
    <div class="conf-btns">
      <button class="btn-ccancel" onclick="closeConf()">Cancelar</button>
      <button class="btn-cdel" onclick="runConf()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    function selectRole(btn, role){
      document.querySelectorAll('.role-btn').forEach(b=>{
        b.style.background='var(--s2)';
        b.style.borderColor='var(--b2)';
        b.querySelectorAll('svg')[0].style.stroke='currentColor';
        b.querySelectorAll('div')[0].style.color='var(--t1)';
      });
      btn.style.background='var(--acc)';
      btn.style.borderColor='var(--acc)';
      btn.querySelectorAll('svg')[0].style.stroke='white';
      btn.querySelectorAll('div')[0].style.color='white';
      document.getElementById('r-role').value=role;
    }
  </script>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
  </script>
  <script>emailjs.init('OVEsOgP7lLroHL8Bo');</script>
  <script src="app.js"></script>

</body>
</html>
