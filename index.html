<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Spring · Gestión de Cocina</title>
  <meta name="theme-color" content="#0a0a0a"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_xPTSVu7YsNtsqGLapdzH8FCgzzUIEao",
      authDomain: "spring-2533d.firebaseapp.com",
      databaseURL: "https://spring-2533d-default-rtdb.firebaseio.com",
      projectId: "spring-2533d",
      storageBucket: "spring-2533d.firebasestorage.app",
      messagingSenderId: "59482220773",
      appId: "1:59482220773:web:1c3b603c0396bbd05c8c0c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    window._fb = { auth, db, ref, onValue, set, push, remove, update, get, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged };
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
      --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);
      --t1:#f0ebe4;--t2:#9a9088;--t3:#5c5550;
      --acc:#c8481e;--acc2:#e06030;--grn:#2e8b5a;--ylw:#c4920a;--blu:#2a6cb0;
      --font-h:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
      --r:14px;--r2:8px;
    }
    html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font-b);overflow-x:hidden;}

    #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s;}
    #splash h1{font-family:var(--font-h);font-size:56px;letter-spacing:-2px;}
    #splash p{font-size:11px;letter-spacing:4px;color:var(--t3);text-transform:uppercase;margin-top:6px;}
    #splash .dot{width:6px;height:6px;background:var(--acc);border-radius:50%;margin-top:48px;animation:pulse 1.2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

    #auth{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;flex-direction:column;}
    .auth-wrap{width:100%;max-width:380px;}
    .auth-logo{font-family:var(--font-h);font-size:40px;text-align:center;margin-bottom:4px;}
    .auth-logo span{color:var(--acc);}
    .auth-tag{text-align:center;font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}
    .auth-card{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:26px 20px;}
    .tabs2{display:flex;background:var(--s2);border-radius:var(--r2);padding:3px;margin-bottom:20px;}
    .tab2{flex:1;padding:9px;text-align:center;font-size:13px;font-family:var(--font-b);background:none;border:none;color:var(--t2);border-radius:6px;cursor:pointer;transition:all .2s;}
    .tab2.on{background:var(--acc);color:#fff;font-weight:600;}
    .fld{margin-bottom:12px;}
    .fld label{display:block;font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
    .fld input,.fld select{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:11px 13px;color:var(--t1);font-size:15px;font-family:var(--font-b);outline:none;transition:border .2s;}
    .fld input:focus,.fld select:focus{border-color:var(--acc);}
    .fld select option{background:#1c1c1c;}
    .btn-main{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:15px;font-family:var(--font-b);font-weight:600;cursor:pointer;margin-top:6px;}
    .auth-err{color:#e74c3c;font-size:13px;text-align:center;margin-top:10px;min-height:18px;}
    .auth-info{color:var(--t3);font-size:12px;text-align:center;margin-top:10px;line-height:1.5;}

    #app{display:none;flex-direction:column;min-height:100vh;}
    .hdr{background:var(--s1);border-bottom:1px solid var(--b1);padding:14px 16px 0;position:sticky;top:0;z-index:50;}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .hdr-logo{font-family:var(--font-h);font-size:26px;letter-spacing:-1px;}
    .hdr-logo span{color:var(--acc);}
    .hdr-right{display:flex;align-items:center;gap:8px;}
    .role-badge{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--b2);color:var(--t2);background:var(--s2);}
    .btn-out{background:none;border:1px solid var(--b2);border-radius:var(--r2);color:var(--t3);padding:5px 9px;font-size:12px;cursor:pointer;font-family:var(--font-b);}
    .online{display:flex;align-items:center;gap:5px;margin-top:2px;}
    .odot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;}
    .olbl{font-size:10px;color:var(--t3);}
    .nav{display:flex;overflow-x:auto;gap:0;scrollbar-width:none;border-bottom:1px solid var(--b1);}
    .nav::-webkit-scrollbar{display:none;}
    .nav-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);padding:10px 14px;font-size:12px;cursor:pointer;font-family:var(--font-b);letter-spacing:.8px;text-transform:uppercase;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
    .nav-btn.on{color:var(--t1);border-bottom-color:var(--acc);}
    .content{flex:1;padding:16px 14px 100px;}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
    .stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:12px 8px;text-align:center;}
    .stat.warn{border-color:rgba(200,72,30,.35);background:rgba(200,72,30,.07);}
    .stat-v{font-size:20px;font-weight:600;}
    .stat-v.r{color:var(--acc);}
    .stat-v.g{color:var(--grn);}
    .stat-l{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

    .card{background:var(--s1);border:1px solid var(--b1);border-left:3px solid transparent;border-radius:var(--r);padding:14px;margin-bottom:10px;}
    .card.low{border-left-color:var(--acc);background:rgba(200,72,30,.06);}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .card-name{font-size:16px;font-weight:600;margin-bottom:3px;}
    .card-sub{font-size:11px;letter-spacing:1px;text-transform:uppercase;}
    .card-acts{display:flex;gap:6px;}
    .ic-btn{background:var(--s2);border:none;border-radius:var(--r2);color:var(--t2);width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .ic-btn.red{background:rgba(200,72,30,.15);color:var(--acc);}
    .ic-btn.grn{background:rgba(46,139,90,.15);color:var(--grn);}
    .sbar{background:var(--s2);border-radius:4px;height:3px;margin-bottom:10px;overflow:hidden;}
    .sbar-fill{height:100%;border-radius:4px;transition:width .4s;}
    .card-bot{display:flex;justify-content:space-between;align-items:center;}
    .qty-c{display:flex;align-items:center;gap:8px;}
    .qty-btn{background:var(--s2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);width:32px;height:32px;cursor:pointer;font-size:18px;font-family:var(--font-b);display:flex;align-items:center;justify-content:center;}
    .qty-v{font-size:16px;font-weight:600;min-width:55px;text-align:center;}
    .qty-u{font-size:11px;color:var(--t3);}
    .card-val{text-align:right;}
    .val-t{font-size:14px;font-weight:600;color:var(--grn);}
    .val-m{font-size:10px;color:var(--t3);margin-top:2px;}
    .low-tag{display:inline-block;background:var(--acc);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}

    .srow{display:flex;gap:8px;margin-bottom:14px;}
    .sinput{flex:1;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r2);padding:10px 13px;color:var(--t1);font-size:14px;font-family:var(--font-b);outline:none;}
    .sinput:focus{border-color:var(--acc);}
    .sfilt{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r2);padding:10px;color:var(--t2);font-size:13px;font-family:var(--font-b);outline:none;cursor:pointer;}

    .cal-tabs{display:flex;background:var(--s2);border-radius:var(--r2);padding:3px;margin-bottom:14px;}
    .cal-tab{flex:1;padding:8px;text-align:center;font-size:12px;font-family:var(--font-b);background:none;border:none;color:var(--t2);border-radius:6px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;}
    .cal-tab.on{background:var(--acc);color:#fff;font-weight:600;}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .cal-title{font-family:var(--font-h);font-size:18px;text-align:center;flex:1;padding:0 8px;}
    .cal-btn{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);color:var(--t1);padding:7px 14px;cursor:pointer;font-size:18px;font-family:var(--font-b);}
    .menu-day{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;}
    .menu-date{font-size:11px;color:var(--acc);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
    .menu-dish{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b1);}
    .menu-dish:last-child{border-bottom:none;padding-bottom:0;}
    .dish-name{font-size:15px;font-weight:500;}
    .dish-cat{font-size:11px;color:var(--t3);margin-top:2px;}
    .dish-acts{display:flex;gap:6px;}

    .order-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;}
    .order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .order-name{font-size:16px;font-weight:600;}
    .order-prov{font-size:11px;color:var(--blu);margin-top:2px;}
    .order-status{display:inline-block;font-size:10px;padding:3px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
    .status-pend{background:rgba(196,146,10,.15);color:var(--ylw);}
    .status-done{background:rgba(46,139,90,.15);color:var(--grn);}

    .sup-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;}
    .sup-name{font-size:17px;font-weight:600;margin-bottom:4px;}
    .sup-info{font-size:13px;color:var(--t2);margin-bottom:8px;}
    .sup-prods{display:flex;flex-wrap:wrap;gap:6px;}
    .sup-tag{background:var(--s2);border:1px solid var(--b2);border-radius:20px;font-size:11px;padding:3px 10px;color:var(--t2);}

    .sum-section{margin-bottom:22px;}
    .sum-title{font-family:var(--font-h);font-size:18px;margin-bottom:12px;}
    .sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1);}
    .sum-row:last-child{border-bottom:none;}
    .sum-label{font-size:14px;color:var(--t2);}
    .sum-val{font-size:14px;font-weight:600;}

    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .sec-ttl{font-family:var(--font-h);font-size:20px;}
    .btn-sm{background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:7px 13px;font-size:13px;font-family:var(--font-b);font-weight:600;cursor:pointer;}
    .btn-sm-ghost{background:var(--s2);color:var(--t2);border:1px solid var(--b2);border-radius:var(--r2);padding:7px 13px;font-size:13px;font-family:var(--font-b);cursor:pointer;}

    .fab{position:fixed;bottom:24px;right:16px;background:var(--acc);color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(200,72,30,.5);display:flex;align-items:center;justify-content:center;transition:transform .2s;z-index:40;}
    .fab:active{transform:scale(.94);}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:flex-end;justify-content:center;}
    .overlay.on{display:flex;}
    .sheet{background:var(--s1);border:1px solid var(--b2);border-radius:20px 20px 0 0;padding:22px 18px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:up .25s ease;}
    @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sh-handle{width:38px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 18px;}
    .sh-title{font-family:var(--font-h);font-size:22px;margin-bottom:18px;}
    .sh-fld{margin-bottom:13px;}
    .sh-fld label{display:block;font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
    .sh-fld input,.sh-fld select,.sh-fld textarea{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:11px 13px;color:var(--t1);font-size:15px;font-family:var(--font-b);outline:none;transition:border .2s;}
    .sh-fld input:focus,.sh-fld select:focus,.sh-fld textarea:focus{border-color:var(--acc);}
    .sh-fld textarea{resize:vertical;min-height:80px;}
    .sh-fld select option{background:#1c1c1c;}
    .sh-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .sh-acts{display:flex;gap:10px;margin-top:18px;}
    .btn-cancel{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:12px;color:var(--t2);font-size:14px;font-family:var(--font-b);cursor:pointer;}
    .btn-save{flex:2;background:var(--acc);border:none;border-radius:var(--r2);padding:12px;color:#fff;font-size:14px;font-weight:600;font-family:var(--font-b);cursor:pointer;}

    .conf-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:24px;}
    .conf-ov.on{display:flex;}
    .conf-box{background:var(--s1);border:1px solid var(--acc);border-radius:20px;padding:28px 22px;width:100%;max-width:340px;text-align:center;}
    .conf-ico{font-size:40px;margin-bottom:12px;}
    .conf-title{font-family:var(--font-h);font-size:22px;margin-bottom:8px;}
    .conf-item{color:var(--acc);font-weight:600;font-size:16px;background:rgba(200,72,30,.1);border:1px solid rgba(200,72,30,.25);border-radius:var(--r2);padding:10px;margin:12px 0;}
    .conf-note{font-size:12px;color:var(--t3);margin-bottom:22px;}
    .conf-btns{display:flex;gap:10px;}
    .btn-ccancel{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:12px;color:var(--t2);font-size:14px;font-family:var(--font-b);cursor:pointer;}
    .btn-cdel{flex:1;background:var(--acc);border:none;border-radius:var(--r2);padding:12px;color:#fff;font-size:14px;font-weight:600;font-family:var(--font-b);cursor:pointer;}

    .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--t1);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    .toast.on{opacity:1;}

    .empty{text-align:center;padding:50px 20px;color:var(--t3);}
    .empty-ico{font-size:36px;margin-bottom:10px;}

    .sec-label{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:16px;}
    .sec-label:first-child{margin-top:0;}
  </style>
</head>
<body>

<div id="splash">
  <h1>Spring<span style="color:var(--acc)">.</span></h1>
  <p>Gestión de Cocina</p>
  <div class="dot"></div>
</div>

<div id="auth" style="display:none;flex-direction:column;">
  <div class="auth-wrap">
    <div class="auth-logo">Spring<span>.</span></div>
    <div class="auth-tag">Gestión de Cocina · Buffet</div>
    <div class="auth-card">
      <div class="tabs2">
        <button class="tab2 on" onclick="authTab('login')">Ingresar</button>
        <button class="tab2" onclick="authTab('register')">Registrarse</button>
      </div>
      <div id="login-f">
        <div class="fld"><label>Correo</label><input type="email" id="l-email" placeholder="tu@correo.com"/></div>
        <div class="fld"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
        <button class="btn-main" onclick="doLogin()">Ingresar</button>
      </div>
      <div id="reg-f" style="display:none">
        <div class="fld"><label>Nombre</label><input type="text" id="r-name" placeholder="Tu nombre"/></div>
        <div class="fld"><label>Correo</label><input type="email" id="r-email" placeholder="tu@correo.com"/></div>
        <div class="fld"><label>Contraseña</label><input type="password" id="r-pass" placeholder="mínimo 6 caracteres"/></div>
        <div class="fld"><label>Rol</label>
          <select id="r-role">
            <option value="gerente">👩‍💼 Gerente</option>
            <option value="chef">👨‍🍳 Chef</option>
            <option value="cocinero">🧑‍🍳 Cocinero</option>
            <option value="deposito">📦 Depósito</option>
            <option value="salon">🍽️ Salón</option>
          </select>
        </div>
        <div class="fld"><label>Código de cuenta</label><input type="text" id="r-code" placeholder="ej: SPRING-001"/></div>
        <button class="btn-main" onclick="doRegister()">Crear cuenta</button>
        <div class="auth-info">Usá el código que te dio el administrador.</div>
      </div>
      <div class="auth-err" id="auth-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-logo">Spring<span>.</span></div>
        <div class="online"><span class="odot"></span><span class="olbl">Tiempo real</span></div>
      </div>
      <div class="hdr-right">
        <div class="role-badge" id="role-badge">—</div>
        <button class="btn-out" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <nav class="nav" id="main-nav"></nav>
  </div>
  <div class="content" id="main-content"></div>
</div>

<button class="fab" id="fab" style="display:none">+</button>

<div class="overlay" id="sheet-ov" onclick="closeSheetIfOut(event)">
  <div class="sheet" id="sheet-inner"></div>
</div>

<div class="conf-ov" id="conf-ov">
  <div class="conf-box">
    <div class="conf-ico">⚠️</div>
    <div class="conf-title">¿Eliminar?</div>
    <div class="conf-item" id="conf-item">—</div>
    <div class="conf-note">Esta acción no se puede deshacer.</div>
    <div class="conf-btns">
      <button class="btn-ccancel" onclick="closeConf()">Cancelar</button>
      <button class="btn-cdel" onclick="runConf()">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let user=null,userRole=null,userName=null,accountId=null;
let products={},menuItems={},orders={},suppliers={};
let currentTab='inventario';
let editKey=null,delKey=null,confFn=null;
let menuView='dia',menuOffset=0;

const ROLES={
  gerente:{label:'👩‍💼 Gerente',tabs:['inventario','menu','pedidos','proveedores','resumen']},
  chef:{label:'👨‍🍳 Chef',tabs:['inventario','menu','pedidos']},
  cocinero:{label:'🧑‍🍳 Cocinero',tabs:['inventario','menu']},
  deposito:{label:'📦 Depósito',tabs:['inventario','pedidos']},
  salon:{label:'🍽️ Salón',tabs:['menu']},
};
const TAB_LABELS={inventario:'🥩 Inventario',menu:'📋 Menú',pedidos:'🛒 Pedidos',proveedores:'🏪 Proveedores',resumen:'📊 Resumen'};
const CAT_COLORS={Res:'#c0392b',Pollo:'#e67e22',Cerdo:'#8e44ad',Pescado:'#2980b9',Suplemento:'#27ae60',Lácteos:'#16a085',Vegetales:'#27ae60',Otro:'#7f8c8d'};
const UNITS=['kg','g','Piezas','Paquetes','Frascos','Cajas','Litros','Unidades'];
const CATS=['Res','Pollo','Cerdo','Pescado','Suplemento','Lácteos','Vegetales','Otro'];
const DISH_CATS=['Entrada','Plato Principal','Acompañamiento','Postre','Bebida'];

function waitFB(cb,t=0){if(window._fb){cb();}else if(t<30){setTimeout(()=>waitFB(cb,t+1),200);}else{alert('Error conectando Firebase');}}

window.addEventListener('load',()=>{
  waitFB(()=>{
    const{auth,onAuthStateChanged}=window._fb;
    onAuthStateChanged(auth,u=>{
      hideSplash();
      if(u){user=u;loadUser();}
      else{showAuth();}
    });
  });
});

function hideSplash(){const s=document.getElementById('splash');s.style.opacity='0';setTimeout(()=>s.style.display='none',500);}
function showAuth(){document.getElementById('auth').style.display='flex';}
function showApp(){document.getElementById('auth').style.display='none';document.getElementById('app').style.display='flex';}

function authTab(t){
  document.getElementById('login-f').style.display=t==='login'?'block':'none';
  document.getElementById('reg-f').style.display=t==='register'?'block':'none';
  document.querySelectorAll('.tab2').forEach((el,i)=>el.classList.toggle('on',(i===0)===(t==='login')));
  document.getElementById('auth-err').textContent='';
}
function setErr(m){document.getElementById('auth-err').textContent=m;}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){setErr('Completá todos los campos');return;}
  try{const{auth,signInWithEmailAndPassword}=window._fb;await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){setErr('Correo o contraseña incorrectos');}
}

async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  const role=document.getElementById('r-role').value;
  const code=document.getElementById('r-code').value.trim();
  if(!name||!email||!pass||!code){setErr('Completá todos los campos');return;}
  if(pass.length<6){setErr('Mínimo 6 caracteres');return;}
  try{
    const{auth,db,ref,set,createUserWithEmailAndPassword}=window._fb;
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await set(ref(db,`userAccounts/${cred.user.uid}`),{code,role,name,email});
  }catch(e){
    if(e.code==='auth/email-already-in-use')setErr('Ese correo ya está registrado');
    else setErr('Error: '+e.message);
  }
}

async function doLogout(){
  const{auth,signOut}=window._fb;
  await signOut(auth);
  user=null;userRole=null;accountId=null;
  products={};menuItems={};orders={};suppliers={};
  document.getElementById('app').style.display='none';
  document.getElementById('fab').style.display='none';
  showAuth();
}

async function loadUser(){
  const{db,ref,get,onValue}=window._fb;
  const snap=await get(ref(db,`userAccounts/${user.uid}`));
  if(!snap.exists()){doLogout();return;}
  const data=snap.val();
  userRole=data.role||'salon';
  userName=data.name||user.email;
  accountId=data.code||'SPRING-001';
  document.getElementById('role-badge').textContent=ROLES[userRole]?.label||userRole;
  buildNav();
  showApp();
  onValue(ref(db,`accounts/${accountId}/products`),s=>{products=s.val()||{};renderTab();});
  onValue(ref(db,`accounts/${accountId}/menu`),s=>{menuItems=s.val()||{};renderTab();});
  onValue(ref(db,`accounts/${accountId}/orders`),s=>{orders=s.val()||{};renderTab();});
  onValue(ref(db,`accounts/${accountId}/suppliers`),s=>{suppliers=s.val()||{};renderTab();});
}

function buildNav(){
  const tabs=ROLES[userRole]?.tabs||['menu'];
  if(!tabs.includes(currentTab))currentTab=tabs[0];
  document.getElementById('main-nav').innerHTML=tabs.map(t=>`<button class="nav-btn${t===currentTab?' on':''}" onclick="goTab('${t}')">${TAB_LABELS[t]}</button>`).join('');
  renderTab();
}

function goTab(t){
  currentTab=t;
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.toggle('on',el.getAttribute('onclick')===`goTab('${t}')`));
  renderTab();
}

function renderTab(){
  const c=document.getElementById('main-content');
  const fab=document.getElementById('fab');
  fab.style.display='none';fab.onclick=null;
  if(currentTab==='inventario')doInventario(c,fab);
  else if(currentTab==='menu')doMenu(c,fab);
  else if(currentTab==='pedidos')doPedidos(c,fab);
  else if(currentTab==='proveedores')doProveedores(c,fab);
  else if(currentTab==='resumen')doResumen(c);
}

// ── INVENTARIO ──
function doInventario(el,fab){
  const arr=Object.values(products);
  const low=arr.filter(p=>p.quantity<=p.minStock);
  const val=arr.reduce((a,p)=>a+(p.quantity*p.price),0);
  const canEdit=['gerente','chef','cocinero','deposito'].includes(userRole);

  el.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-v">${arr.length}</div><div class="stat-l">Productos</div></div>
      <div class="stat warn"><div class="stat-v r">${low.length}</div><div class="stat-l">Stock Bajo</div></div>
      <div class="stat"><div class="stat-v g" style="font-size:14px">R$${Math.round(val).toLocaleString('pt-BR')}</div><div class="stat-l">Valor</div></div>
    </div>
    <div class="srow">
      <input class="sinput" id="srch" placeholder="🔍 Buscar..." oninput="doInventario(document.getElementById('main-content'),document.getElementById('fab'))"/>
      <select class="sfilt" id="sfilt" onchange="doInventario(document.getElementById('main-content'),document.getElementById('fab'))">
        <option value="">Todos</option>${CATS.map(c=>`<option>${c}</option>`).join('')}
      </select>
    </div>
    <div id="plist"></div>`;

  const srch=(document.getElementById('srch')?.value||'').toLowerCase();
  const cat=document.getElementById('sfilt')?.value||'';
  const filtered=Object.entries(products).filter(([k,p])=>p.name.toLowerCase().includes(srch)&&(!cat||p.category===cat));
  const plist=document.getElementById('plist');

  if(!filtered.length){plist.innerHTML='<div class="empty"><div class="empty-ico">🥩</div><p>No hay productos</p></div>';return;}
  plist.innerHTML=filtered.map(([key,p])=>{
    const isLow=p.quantity<=p.minStock;
    const pct=Math.min(100,(p.quantity/Math.max(1,p.minStock*2))*100);
    const cc=CAT_COLORS[p.category]||'#7f8c8d';
    return`<div class="card${isLow?' low':''}" style="border-left-color:${cc}">
      <div class="card-top">
        <div>
          <div class="card-name">${p.name}${isLow?'<span class="low-tag">bajo</span>':''}</div>
          <div class="card-sub" style="color:${cc}">${p.category}</div>
        </div>
        <div class="card-acts">
          <button class="ic-btn grn" title="Agregar a pedido" onclick="quickOrder('${key}')">🛒</button>
          ${canEdit?`<button class="ic-btn" onclick="openProd('${key}')">✏️</button><button class="ic-btn red" onclick="askDel('${key}','${p.name.replace(/'/g,"\\'")}',delProd)">🗑️</button>`:''}
        </div>
      </div>
      <div class="sbar"><div class="sbar-fill" style="width:${pct}%;background:${isLow?'var(--acc)':'var(--grn)'}"></div></div>
      <div class="card-bot">
        <div class="qty-c">
          ${canEdit?`<button class="qty-btn" onclick="chgQty('${key}',-1)">−</button>`:''}
          <div class="qty-v">${p.quantity} <span class="qty-u">${p.unit}</span></div>
          ${canEdit?`<button class="qty-btn" onclick="chgQty('${key}',1)">+</button>`:''}
        </div>
        <div class="card-val">
          <div class="val-t">R$ ${Math.round(p.quantity*p.price).toLocaleString('pt-BR')}</div>
          <div class="val-m">Mín: ${p.minStock} ${p.unit}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  if(canEdit){fab.style.display='flex';fab.onclick=()=>openProd(null);}
}

function chgQty(key,d){
  const p=products[key];if(!p)return;
  const{db,ref,update}=window._fb;
  update(ref(db,`accounts/${accountId}/products/${key}`),{quantity:Math.max(0,p.quantity+d)});
}

function openProd(key){
  editKey=key;const p=key?products[key]:null;
  const sups=Object.entries(suppliers).map(([k,s])=>`<option value="${k}"${p?.supplierId===k?' selected':''}>${s.name}</option>`).join('');
  showSheet(`${p?'Editar':'Nuevo'} Producto`,`
    <div class="sh-fld"><label>Nombre</label><input id="pf-n" value="${p?.name||''}" placeholder="Ej: Picanha"/></div>
    <div class="sh-row">
      <div class="sh-fld"><label>Categoría</label><select id="pf-c">${CATS.map(c=>`<option${p?.category===c?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="sh-fld"><label>Unidad</label><select id="pf-u">${UNITS.map(u=>`<option${p?.unit===u?' selected':''}>${u}</option>`).join('')}</select></div>
    </div>
    <div class="sh-row">
      <div class="sh-fld"><label>Cantidad</label><input type="number" id="pf-q" value="${p?.quantity||''}" placeholder="0"/></div>
      <div class="sh-fld"><label>Stock mínimo</label><input type="number" id="pf-m" value="${p?.minStock||''}" placeholder="0"/></div>
    </div>
    <div class="sh-fld"><label>Precio (R$)</label><input type="number" id="pf-p" value="${p?.price||''}" placeholder="0"/></div>
    <div class="sh-fld"><label>Proveedor</label><select id="pf-s"><option value="">Sin proveedor</option>${sups}</select></div>
    <div class="sh-acts"><button class="btn-cancel" onclick="closeSheet()">Cancelar</button><button class="btn-save" onclick="saveProd()">Guardar</button></div>
  `);
}

async function saveProd(){
  const name=document.getElementById('pf-n').value.trim();
  const qty=parseFloat(document.getElementById('pf-q').value);
  const min=parseFloat(document.getElementById('pf-m').value);
  if(!name||isNaN(qty)||isNaN(min)){showToast('Completá los campos obligatorios');return;}
  const data={name,category:document.getElementById('pf-c').value,unit:document.getElementById('pf-u').value,quantity:qty,minStock:min,price:parseFloat(document.getElementById('pf-p').value)||0,supplierId:document.getElementById('pf-s').value,updatedAt:Date.now()};
  const{db,ref,set,push}=window._fb;
  if(editKey)await set(ref(db,`accounts/${accountId}/products/${editKey}`),{...products[editKey],...data});
  else{data.createdAt=Date.now();await push(ref(db,`accounts/${accountId}/products`),data);}
  closeSheet();showToast(editKey?'Producto actualizado ✓':'Producto agregado ✓');
}

function delProd(){
  const{db,ref,remove}=window._fb;
  remove(ref(db,`accounts/${accountId}/products/${delKey}`));
  showToast('Eliminado');closeConf();
}

// ── MENÚ ──
function doMenu(el,fab){
  const canEdit=['gerente','chef'].includes(userRole);
  el.innerHTML=`
    <div class="cal-tabs">
      <button class="cal-tab${menuView==='dia'?' on':''}" onclick="setMV('dia')">Día</button>
      <button class="cal-tab${menuView==='semana'?' on':''}" onclick="setMV('semana')">Semana</button>
      <button class="cal-tab${menuView==='mes'?' on':''}" onclick="setMV('mes')">Mes</button>
    </div>
    <div class="cal-nav">
      <button class="cal-btn" onclick="mNav(-1)">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-btn" onclick="mNav(1)">›</button>
    </div>
    <div id="menu-body"></div>`;
  renderMenuBody();
  if(canEdit){fab.style.display='flex';fab.onclick=()=>openDish(null);}
}

function setMV(v){menuView=v;menuOffset=0;doMenu(document.getElementById('main-content'),document.getElementById('fab'));}
function mNav(d){menuOffset+=d;renderMenuBody();}
function dkey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function renderMenuBody(){
  const body=document.getElementById('menu-body');
  const title=document.getElementById('cal-title');
  if(!body)return;
  const today=new Date();
  const canEdit=['gerente','chef'].includes(userRole);

  if(menuView==='dia'){
    const d=new Date(today);d.setDate(d.getDate()+menuOffset);
    title.textContent=d.toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});
    const items=Object.entries(menuItems).filter(([k,m])=>m.date===dkey(d));
    body.innerHTML=items.length?items.map(([k,m])=>dishCard(k,m,canEdit)).join(''):'<div class="empty"><div class="empty-ico">🍽️</div><p>Sin platos para este día</p></div>';
  }else if(menuView==='semana'){
    const start=new Date(today);
    const dow=start.getDay()||7;
    start.setDate(start.getDate()-dow+1+menuOffset*7);
    title.textContent=`Semana del ${start.toLocaleDateString('es',{day:'numeric',month:'short'})}`;
    let html='';
    for(let i=0;i<7;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const items=Object.entries(menuItems).filter(([k,m])=>m.date===dkey(d));
      html+=`<div class="menu-day">
        <div class="menu-date">${d.toLocaleDateString('es',{weekday:'long',day:'numeric',month:'short'})}</div>
        ${items.length?items.map(([k,m])=>dishRow(k,m,canEdit)).join(''):'<p style="color:var(--t3);font-size:13px">Sin platos</p>'}
      </div>`;
    }
    body.innerHTML=html;
  }else{
    const d=new Date(today.getFullYear(),today.getMonth()+menuOffset,1);
    title.textContent=d.toLocaleDateString('es',{month:'long',year:'numeric'});
    const days=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    let html='';
    for(let i=1;i<=days;i++){
      const day=new Date(d.getFullYear(),d.getMonth(),i);
      const items=Object.entries(menuItems).filter(([k,m])=>m.date===dkey(day));
      if(items.length)html+=`<div class="menu-day">
        <div class="menu-date">${day.toLocaleDateString('es',{weekday:'short',day:'numeric',month:'short'})}</div>
        ${items.map(([k,m])=>dishRow(k,m,canEdit)).join('')}
      </div>`;
    }
    body.innerHTML=html||'<div class="empty"><div class="empty-ico">📅</div><p>Sin platos este mes</p></div>';
  }
}

function dishCard(key,m,canEdit){
  return`<div class="card">
    <div class="card-top">
      <div><div class="card-name">${m.name}</div><div class="card-sub" style="color:var(--ylw)">${m.category||''}</div></div>
      ${canEdit?`<div class="card-acts"><button class="ic-btn" onclick="openDish('${key}')">✏️</button><button class="ic-btn red" onclick="askDel('${key}','${m.name.replace(/'/g,"\\'")}',delDish)">🗑️</button></div>`:''}
    </div>
    ${m.description?`<p style="font-size:13px;color:var(--t2);line-height:1.5">${m.description}</p>`:''}
  </div>`;
}

function dishRow(key,m,canEdit){
  return`<div class="menu-dish">
    <div><div class="dish-name">${m.name}</div><div class="dish-cat">${m.category||''}</div></div>
    ${canEdit?`<div class="dish-acts"><button class="ic-btn" onclick="openDish('${key}')">✏️</button><button class="ic-btn red" onclick="askDel('${key}','${m.name.replace(/'/g,"\\'")}',delDish)">🗑️</button></div>`:''}
  </div>`;
}

function openDish(key){
  editKey=key;const m=key?menuItems[key]:null;
  const td=dkey(new Date());
  showSheet(`${m?'Editar':'Nuevo'} Plato`,`
    <div class="sh-fld"><label>Nombre del plato</label><input id="df-n" value="${m?.name||''}" placeholder="Ej: Churrasco"/></div>
    <div class="sh-fld"><label>Categoría</label><select id="df-c">${DISH_CATS.map(c=>`<option${m?.category===c?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="sh-fld"><label>Fecha</label><input type="date" id="df-d" value="${m?.date||td}"/></div>
    <div class="sh-fld"><label>Descripción (opcional)</label><textarea id="df-desc" placeholder="Ingredientes, notas...">${m?.description||''}</textarea></div>
    <div class="sh-acts"><button class="btn-cancel" onclick="closeSheet()">Cancelar</button><button class="btn-save" onclick="saveDish()">Guardar</button></div>
  `);
}

async function saveDish(){
  const name=document.getElementById('df-n').value.trim();
  const date=document.getElementById('df-d').value;
  if(!name||!date){showToast('Completá nombre y fecha');return;}
  const data={name,category:document.getElementById('df-c').value,date,description:document.getElementById('df-desc').value.trim(),updatedAt:Date.now()};
  const{db,ref,set,push}=window._fb;
  if(editKey)await set(ref(db,`accounts/${accountId}/menu/${editKey}`),data);
  else{data.createdAt=Date.now();await push(ref(db,`accounts/${accountId}/menu`),data);}
  closeSheet();showToast(editKey?'Plato actualizado ✓':'Plato agregado ✓');
}

function delDish(){
  const{db,ref,remove}=window._fb;
  remove(ref(db,`accounts/${accountId}/menu/${delKey}`));
  showToast('Plato eliminado');closeConf();
}

// ── PEDIDOS ──
function doPedidos(el,fab){
  const canEdit=['gerente','chef','deposito'].includes(userRole);
  const pend=Object.entries(orders).filter(([k,o])=>o.status==='pendiente');
  const done=Object.entries(orders).filter(([k,o])=>o.status==='completado');
  el.innerHTML=`
    <div class="sec-hdr"><div class="sec-ttl">Pedidos</div>${canEdit?'<button class="btn-sm" onclick="openOrder(null)">+ Nuevo</button>':''}</div>
    ${pend.length?`<p class="sec-label">Pendientes (${pend.length})</p>${pend.map(([k,o])=>orderCard(k,o,canEdit)).join('')}`:''}
    ${done.length?`<p class="sec-label">Completados (${done.length})</p>${done.map(([k,o])=>orderCard(k,o,false)).join('')}`:''}
    ${!pend.length&&!done.length?'<div class="empty"><div class="empty-ico">🛒</div><p>No hay pedidos</p></div>':''}`;
}

function orderCard(key,o,canEdit){
  const sup=suppliers[o.supplierId];
  return`<div class="order-card">
    <div class="order-top">
      <div><div class="order-name">${o.productName}</div>${sup?`<div class="order-prov">📦 ${sup.name}</div>`:''}</div>
      <span class="order-status ${o.status==='pendiente'?'status-pend':'status-done'}">${o.status}</span>
    </div>
    <p style="font-size:13px;color:var(--t2)">Cantidad: <strong style="color:var(--t1)">${o.quantity} ${o.unit||''}</strong></p>
    ${o.notes?`<p style="font-size:12px;color:var(--t3);margin-top:6px">${o.notes}</p>`:''}
    ${canEdit?`<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      ${o.status==='pendiente'?`<button class="btn-sm-ghost" onclick="completeOrd('${key}')">✓ Completado</button>`:''}
      <button class="btn-sm-ghost" onclick="openOrder('${key}')">✏️ Editar</button>
      <button class="ic-btn red" onclick="askDel('${key}','${o.productName.replace(/'/g,"\\'")}',delOrder)">🗑️</button>
    </div>`:''}
  </div>`;
}

function quickOrder(prodKey){
  const p=products[prodKey];if(!p)return;
  editKey=null;
  const sups=Object.entries(suppliers).map(([k,s])=>`<option value="${k}"${p.supplierId===k?' selected':''}>${s.name}</option>`).join('');
  showSheet('Agregar a Pedido',`
    <div class="sh-fld"><label>Producto</label><input id="of-n" value="${p.name}" readonly style="opacity:.7"/></div>
    <div class="sh-row">
      <div class="sh-fld"><label>Cantidad</label><input type="number" id="of-q" value="${p.minStock}" placeholder="0"/></div>
      <div class="sh-fld"><label>Unidad</label><input id="of-u" value="${p.unit}" readonly style="opacity:.7"/></div>
    </div>
    <div class="sh-fld"><label>Proveedor</label><select id="of-s"><option value="">Sin proveedor</option>${sups}</select></div>
    <div class="sh-fld"><label>Notas</label><input id="of-notes" placeholder="Notas adicionales"/></div>
    <div class="sh-acts"><button class="btn-cancel" onclick="closeSheet()">Cancelar</button><button class="btn-save" onclick="saveOrd('${p.name}','${p.unit}')">Agregar</button></div>
  `);
}

function openOrder(key){
  editKey=key;const o=key?orders[key]:null;
  const sups=Object.entries(suppliers).map(([k,s])=>`<option value="${k}"${o?.supplierId===k?' selected':''}>${s.name}</option>`).join('');
  showSheet(`${o?'Editar':'Nuevo'} Pedido`,`
    <div class="sh-fld"><label>Producto</label><input id="of-n" value="${o?.productName||''}" placeholder="Nombre del producto"/></div>
    <div class="sh-row">
      <div class="sh-fld"><label>Cantidad</label><input type="number" id="of-q" value="${o?.quantity||''}" placeholder="0"/></div>
      <div class="sh-fld"><label>Unidad</label><select id="of-u">${UNITS.map(u=>`<option${o?.unit===u?' selected':''}>${u}</option>`).join('')}</select></div>
    </div>
    <div class="sh-fld"><label>Proveedor</label><select id="of-s"><option value="">Sin proveedor</option>${sups}</select></div>
    <div class="sh-fld"><label>Notas</label><input id="of-notes" value="${o?.notes||''}" placeholder="Notas adicionales"/></div>
    <div class="sh-acts"><button class="btn-cancel" onclick="closeSheet()">Cancelar</button><button class="btn-save" onclick="saveOrd('','')">Guardar</button></div>
  `);
}

async function saveOrd(pName,pUnit){
  const name=(document.getElementById('of-n')?.value.trim())||pName;
  const qty=parseFloat(document.getElementById('of-q').value);
  if(!name||isNaN(qty)){showToast('Completá nombre y cantidad');return;}
  const data={productName:name,quantity:qty,unit:document.getElementById('of-u')?.value||pUnit,supplierId:document.getElementById('of-s').value,notes:document.getElementById('of-notes').value.trim(),status:'pendiente',updatedAt:Date.now()};
  const{db,ref,set,push}=window._fb;
  if(editKey)await set(ref(db,`accounts/${accountId}/orders/${editKey}`),{...orders[editKey],...data});
  else{data.createdAt=Date.now();await push(ref(db,`accounts/${accountId}/orders`),data);}
  closeSheet();showToast('Pedido guardado ✓');
}

async function completeOrd(key){
  const{db,ref,update}=window._fb;
  await update(ref(db,`accounts/${accountId}/orders/${key}`),{status:'completado',completedAt:Date.now()});
  showToast('Marcado como completado ✓');
}

function delOrder(){
  const{db,ref,remove}=window._fb;
  remove(ref(db,`accounts/${accountId}/orders/${delKey}`));
  showToast('Pedido eliminado');closeConf();
}

// ── PROVEEDORES ──
function doProveedores(el,fab){
  el.innerHTML=`<div class="sec-hdr"><div class="sec-ttl">Proveedores</div></div><div id="slist"></div>`;
  const slist=document.getElementById('slist');
  const arr=Object.entries(suppliers);
  if(!arr.length){slist.innerHTML='<div class="empty"><div class="empty-ico">🏪</div><p>No hay proveedores</p></div>';return;}
  slist.innerHTML=arr.map(([key,s])=>{
    const prods=Object.values(products).filter(p=>p.supplierId===key);
    return`<div class="sup-card">
      <div class="card-top">
        <div><div class="sup-name">${s.name}</div><div class="sup-info">${s.phone?`📞 ${s.phone} `:''}${s.email?`✉️ ${s.email}`:''}</div></div>
        <div class="card-acts">
          <button class="ic-btn" onclick="openSup('${key}')">✏️</button>
          <button class="ic-btn red" onclick="askDel('${key}','${s.name.replace(/'/g,"\\'")}',delSup)">🗑️</button>
        </div>
      </div>
      ${s.notes?`<p style="font-size:13px;color:var(--t2);margin-bottom:10px">${s.notes}</p>`:''}
      <div class="sup-prods">${prods.length?prods.map(p=>`<span class="sup-tag">🥩 ${p.name}</span>`).join(''):'<span style="font-size:12px;color:var(--t3)">Sin productos asignados</span>'}</div>
    </div>`;
  }).join('');
  fab.style.display='flex';fab.onclick=()=>openSup(null);
}

function openSup(key){
  editKey=key;const s=key?suppliers[key]:null;
  showSheet(`${s?'Editar':'Nuevo'} Proveedor`,`
    <div class="sh-fld"><label>Nombre</label><input id="sf-n" value="${s?.name||''}" placeholder="Ej: Frigorífico Central"/></div>
    <div class="sh-fld"><label>Teléfono</label><input id="sf-p" value="${s?.phone||''}" placeholder="+55 41 ..."/></div>
    <div class="sh-fld"><label>Email</label><input type="email" id="sf-e" value="${s?.email||''}" placeholder="proveedor@email.com"/></div>
    <div class="sh-fld"><label>Notas</label><textarea id="sf-no" placeholder="Horarios, condiciones...">${s?.notes||''}</textarea></div>
    <div class="sh-acts"><button class="btn-cancel" onclick="closeSheet()">Cancelar</button><button class="btn-save" onclick="saveSup()">Guardar</button></div>
  `);
}

async function saveSup(){
  const name=document.getElementById('sf-n').value.trim();
  if(!name){showToast('El nombre es obligatorio');return;}
  const data={name,phone:document.getElementById('sf-p').value.trim(),email:document.getElementById('sf-e').value.trim(),notes:document.getElementById('sf-no').value.trim(),updatedAt:Date.now()};
  const{db,ref,set,push}=window._fb;
  if(editKey)await set(ref(db,`accounts/${accountId}/suppliers/${editKey}`),{...suppliers[editKey],...data});
  else{data.createdAt=Date.now();await push(ref(db,`accounts/${accountId}/suppliers`),data);}
  closeSheet();showToast(editKey?'Proveedor actualizado ✓':'Proveedor agregado ✓');
}

function delSup(){
  const{db,ref,remove}=window._fb;
  remove(ref(db,`accounts/${accountId}/suppliers/${delKey}`));
  showToast('Proveedor eliminado');closeConf();
}

// ── RESUMEN ──
function doResumen(el){
  const arr=Object.values(products);
  const low=arr.filter(p=>p.quantity<=p.minStock);
  const val=arr.reduce((a,p)=>a+(p.quantity*p.price),0);
  const pend=Object.values(orders).filter(o=>o.status==='pendiente');
  const td=dkey(new Date());
  const todayMenu=Object.values(menuItems).filter(m=>m.date===td);
  const bySup={};
  pend.forEach(o=>{const n=suppliers[o.supplierId]?.name||'Sin proveedor';if(!bySup[n])bySup[n]=[];bySup[n].push(o);});

  el.innerHTML=`
    <div class="sum-section">
      <div class="sum-title">📊 Resumen General</div>
      <div class="sum-row"><span class="sum-label">Total productos</span><span class="sum-val">${arr.length}</span></div>
      <div class="sum-row"><span class="sum-label">Stock bajo</span><span class="sum-val" style="color:var(--acc)">${low.length}</span></div>
      <div class="sum-row"><span class="sum-label">Valor del inventario</span><span class="sum-val" style="color:var(--grn)">R$ ${Math.round(val).toLocaleString('pt-BR')}</span></div>
      <div class="sum-row"><span class="sum-label">Pedidos pendientes</span><span class="sum-val" style="color:var(--ylw)">${pend.length}</span></div>
      <div class="sum-row"><span class="sum-label">Platos en menú hoy</span><span class="sum-val">${todayMenu.length}</span></div>
    </div>
    ${low.length?`<div class="sum-section">
      <div class="sum-title">⚠️ Stock Bajo</div>
      ${low.map(p=>`<div class="sum-row"><span class="sum-label">${p.name}</span><span class="sum-val" style="color:var(--acc)">${p.quantity} ${p.unit} <span style="color:var(--t3);font-size:12px">(mín ${p.minStock})</span></span></div>`).join('')}
    </div>`:''}
    ${pend.length?`<div class="sum-section">
      <div class="sum-title">🛒 Pedidos por Proveedor</div>
      ${Object.entries(bySup).map(([sup,items])=>`
        <p style="font-size:11px;color:var(--blu);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;font-weight:600">${sup}</p>
        ${items.map(o=>`<div class="sum-row"><span class="sum-label">${o.productName}</span><span class="sum-val">${o.quantity} ${o.unit||''}</span></div>`).join('')}
      `).join('')}
    </div>`:''}
    ${todayMenu.length?`<div class="sum-section">
      <div class="sum-title">🍽️ Menú de Hoy</div>
      ${todayMenu.map(m=>`<div class="sum-row"><span class="sum-label">${m.name}</span><span class="sum-val" style="color:var(--ylw);font-size:12px">${m.category}</span></div>`).join('')}
    </div>`:''}
  `;
}

// ── UTILS ──
function showSheet(title,body){
  document.getElementById('sheet-inner').innerHTML=`<div class="sh-handle"></div><div class="sh-title">${title}</div>${body}`;
  document.getElementById('sheet-ov').classList.add('on');
}
function closeSheet(){document.getElementById('sheet-ov').classList.remove('on');}
function closeSheetIfOut(e){if(e.target===document.getElementById('sheet-ov'))closeSheet();}
function askDel(key,name,fn){delKey=key;confFn=fn;document.getElementById('conf-item').textContent=name;document.getElementById('conf-ov').classList.add('on');}
function closeConf(){document.getElementById('conf-ov').classList.remove('on');delKey=null;confFn=null;}
function runConf(){if(confFn)confFn();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}
</script>
</body>
</html>
