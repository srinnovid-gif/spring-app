<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Spring · Gestão de Cozinha</title>
  <meta name="theme-color" content="#080810"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyD_xPTSVu7YsNtsqGLapdzH8FCgzzUIEao",
      authDomain: "spring-2533d.firebaseapp.com",
      databaseURL: "https://spring-2533d-default-rtdb.firebaseio.com",
      projectId: "spring-2533d",
      storageBucket: "spring-2533d.firebasestorage.app",
      messagingSenderId: "59482220773",
      appId: "1:59482220773:web:1c3b603c0396bbd05c8c0c"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    window._fb = { auth, db, ref, onValue, set, push, remove, update, get, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged };
  </script>

  <link rel="stylesheet" href="style.css"/>

</head></head>
<body>

<div id="splash">
  <div class="splash-bg"></div>
  <div class="splash-center">
    <div class="splash-name-wrap">
      <span class="splash-s">S</span><span class="splash-p">p</span><span class="splash-r">r</span><span class="splash-i">i</span><span class="splash-n">n</span><span class="splash-g">g</span>
    </div>
    <div class="splash-line"></div>
    <div class="splash-rest">Restaurante</div>
    <div class="splash-tagline-nat">Gestão de Cozinha</div>
  </div>
  <div class="splash-bar-wrap">
    <div class="splash-bar"></div>
    <div class="splash-pct" id="splash-pct">Iniciando...</div>
  </div>
</div></div>

<div id="auth" style="display:none;flex-direction:column;">
  <div class="auth-wrap">
    <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:700;font-style:italic;letter-spacing:-2px;text-align:center;margin-bottom:4px;color:#2c1a0e;">Spring<span style="color:#c4541a">.</span></div>
    <div class="auth-tag">Restaurante · Buffet · Curitiba</div>
    <div class="auth-card">
      <div class="tabs2">
        <button class="tab2 on" onclick="authTab('login')">Entrar</button>
        <button class="tab2" onclick="authTab('register')">Cadastrar</button>
      </div>
      <div id="login-f">
        <div class="fld"><label>E-mail</label><input type="email" id="l-email" placeholder="seu@email.com"/></div>
        <div class="fld"><label>Senha</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
        <button class="btn-main" onclick="doLogin()">Entrar</button>
      </div>
      <div id="reg-f" style="display:none">
        <div class="fld"><label>Nome <span style="color:#c4541a;font-weight:700">*</span></label><input type="text" id="r-name" placeholder="Seu nome"/></div>
        <div class="fld"><label>E-mail <span style="color:#c4541a;font-weight:700">*</span></label><input type="email" id="r-email" placeholder="seu@email.com"/></div>
        <div class="fld"><label>Senha <span style="color:#c4541a;font-weight:700">*</span></label><input type="password" id="r-pass" placeholder="mínimo 6 caracteres"/></div>
        <div class="fld"><label>Função</label>
          <select id="r-role">
            <option value="gerente">👩‍💼 Gerente</option>
            <option value="chef">👨‍🍳 Chef</option>
            <option value="cocinero">🧑‍🍳 Cozinheiro</option>
            <option value="deposito">📦 Estoque</option>
            <option value="salon">🍽️ Salão</option>
          </select>
        </div>
        <div class="fld"><label>Celular / WhatsApp</label><input type="tel" id="r-phone" placeholder="+55 41 99999-9999"/></div>
        <div class="fld"><label>Código de acesso <span style="color:#c4541a;font-weight:700">*</span></label><input type="text" id="r-code" placeholder="ex: SPRING-001"/></div>
        <button class="btn-main" onclick="doRegister()">Criar conta</button>
        <div class="auth-info">Use o código fornecido pelo administrador.</div>
      </div>
      <div class="auth-err" id="auth-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <!-- HOME -->
  <div id="home-screen">
    <div class="hdr">
      <div class="hdr-inner">
        <div class="hdr-left">
          <div class="hdr-greeting" id="hdr-greeting">Bem-vindo</div>
          <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;font-style:italic;letter-spacing:-1px;color:#2c1a0e;">Spring<span style="color:#c4541a">.</span></div>
        </div>
        <div class="hdr-right">
          <div class="role-pill" id="role-badge">—</div>
          <button class="btn-out" onclick="doLogout()">Sair</button>
        </div>
      </div>
    </div>
    <div class="online" style="margin-bottom:16px"><span class="odot"></span><span class="olbl">Tempo real ativo</span></div>
    <div class="home-date" id="home-date"></div>
    <div class="qs-row" id="qs-row"></div>
    <div id="alert-strip-wrap"></div>
    <div class="big-nav" id="big-nav"></div>
    <div id="today-menu-wrap"></div>
  </div>
  <!-- INNER -->
  <div id="inner-screen" style="display:none">
    <div class="inner-hdr">
      <div class="inner-hdr-top">
        <button class="btn-back2" onclick="goHome()">←</button>
        <div class="inner-title" id="inner-title"></div>
      </div>
    </div>
    <div id="main-content" class="content"></div>
  </div>
</div>

<button class="fab" id="fab" style="display:none">+</button>

<div class="overlay" id="sheet-ov" onclick="closeSheetIfOut(event)">
  <div class="sheet" id="sheet-inner"></div>
</div>

<div class="conf-ov" id="conf-ov">
  <div class="conf-box">
    <div class="conf-ico">⚠️</div>
    <div class="conf-title">Excluir?</div>
    <div class="conf-item" id="conf-item">—</div>
    <div class="conf-note">Esta ação não pode ser desfeita.</div>
    <div class="conf-btns">
      <button class="btn-ccancel" onclick="closeConf()">Cancelar</button>
      <button class="btn-cdel" onclick="runConf()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('OVEsOgP7lLroHL8Bo');</script>
  <script src="app.js"></script>

</body>
</html>
